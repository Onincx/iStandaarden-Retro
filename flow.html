<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow — Ketentest Bemiddelingsregister</title>
  <link rel="stylesheet" href="css/style.css?v=20">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { overflow: hidden; margin: 0; }

    /* Header */
    .flow-topbar { position: fixed; z-index: 200; left: 0; right: 0; }

    /* Toolbar */
    .flow-toolbar {
      position: fixed; left: 0; right: 0; z-index: 150;
      background: #fff; border-bottom: 1px solid #e5e7eb;
      padding: 8px 16px; display: flex; align-items: center; gap: 8px;
      height: 44px;
    }

    /* Canvas */
    .flow-canvas {
      position: fixed; left: 240px; right: 0; bottom: 0;
      background: #f0f4f8;
      overflow: auto;
    }

    /* SVG voor pijlen - altijd bovenop nodes */
    #arrowSvg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #arrowSvg path { pointer-events: stroke; }
    #arrowSvg path.clickable { pointer-events: stroke; cursor: pointer; }

    /* Nodes */
    .flow-node {
      position: absolute; width: 190px;
      border-radius: 10px; background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10), 0 0 0 2px #e5e7eb;
      cursor: grab; user-select: none;
      transition: box-shadow 0.15s;
      z-index: 5;
    }
    .flow-node:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.14), 0 0 0 2px #39870c; z-index: 6; }
    .flow-node.dragging { cursor: grabbing; box-shadow: 0 12px 32px rgba(0,0,0,0.18), 0 0 0 2px #39870c; z-index: 20; }

    /* Start node - groter en prominenter */
    .flow-node.start-node { width: 260px; box-shadow: 0 4px 16px rgba(57,135,12,0.20), 0 0 0 3px #39870c; }
    .flow-node.start-node:hover { box-shadow: 0 8px 24px rgba(57,135,12,0.25), 0 0 0 3px #2d6e09; }
    .flow-node.start-node .node-head { background: linear-gradient(135deg, #eaf3e0, #d1fae5) !important; }
    .flow-node.start-node .node-code { font-size: 13px !important; }
    .flow-node.start-node .node-title { font-size: 14px !important; padding: 12px 14px 8px !important; }
    .start-badge { display:inline-flex; align-items:center; gap:3px; background:#39870c; color:#fff; border-radius:4px; padding:1px 7px; font-size:10px; font-weight:700; letter-spacing:0.03em; }

    /* Status kleuren */
    .flow-node.s-ok   { box-shadow: 0 2px 8px rgba(0,0,0,0.10), 0 0 0 2px #16a34a; }
    .flow-node.s-ok .node-head   { background: linear-gradient(135deg, #dcfce7, #f0fdf4); }
    .flow-node.s-nok  { box-shadow: 0 2px 8px rgba(0,0,0,0.10), 0 0 0 2px #dc2626; }
    .flow-node.s-nok .node-head  { background: linear-gradient(135deg, #fee2e2, #fff5f5); }
    .flow-node.s-open { box-shadow: 0 2px 8px rgba(0,0,0,0.10), 0 0 0 2px #d1d5db; }
    .flow-node.s-open .node-head { background: linear-gradient(135deg, #f8fafc, #fff); }

    .node-head { border-radius: 9px 9px 0 0; padding: 8px 10px; border-bottom: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: space-between; }
    .node-code { font-size: 10px; font-weight: 800; letter-spacing: 0.03em; }
    .s-ok  .node-code { color: #15803d; }
    .s-nok .node-code { color: #b91c1c; }
    .s-open .node-code { color: #6b7280; }
    .node-emoji { font-size: 14px; }
    .node-title { padding: 8px 10px 6px; font-size: 12px; font-weight: 600; color: #111; line-height: 1.45; }
    .node-bar { margin: 0 10px 4px; height: 3px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
    .node-bar-fill { height: 100%; background: #39870c; border-radius: 99px; }
    .node-foot { padding: 4px 10px 8px; display: flex; align-items: center; justify-content: space-between; }
    .node-pct { font-size: 10px; color: #6b7280; }
    .node-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.15s; }
    .flow-node:hover .node-actions { opacity: 1; }
    .node-btn { border: 1px solid #e5e7eb; background: #fff; border-radius: 5px; padding: 2px 6px; font-size: 10px; cursor: pointer; color: #374151; white-space: nowrap; }
    .node-btn:hover { background: #f3f4f6; }
    .node-btn.connect { border-color: #39870c; color: #39870c; }
    .node-btn.connect.active { background: #39870c; color: #fff; }
    .node-btn.remove { border-color: #fca5a5; color: #dc2626; }

    /* Sidebar */
    .flow-sidebar {
      position: fixed; left: 0; bottom: 0;
      width: 240px; background: #fff;
      border-right: 1px solid #e5e7eb;
      overflow-y: auto; padding: 10px;
      z-index: 100;
    }
    .flow-sidebar h4 { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .sb-item { padding: 7px 9px; border: 1px solid #e5e7eb; border-radius: 6px; margin-bottom: 5px; cursor: pointer; transition: all 0.12s; }
    .sb-item:hover { border-color: #39870c; background: #f0fdf4; }
    .sb-item.on { opacity: 0.4; cursor: default; pointer-events: none; }
    .sb-code { font-size: 10px; font-weight: 700; color: #6b7280; }
    .sb-title { font-size: 11px; color: #374151; margin-top: 1px; line-height: 1.3; }

    /* Popup */
    .node-popup {
      position: absolute; width: 270px; background: #fff;
      border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      z-index: 50; overflow: hidden;
    }
    .popup-head { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .popup-close { border: none; background: none; cursor: pointer; color: #9ca3af; font-size: 16px; padding: 0; line-height: 1; flex-shrink: 0; }
    .popup-acts { max-height: 220px; overflow-y: auto; }
    .popup-act { padding: 7px 12px; border-bottom: 1px solid #f9fafb; display: flex; gap: 7px; align-items: flex-start; }
    .popup-act:last-child { border-bottom: none; }

    /* Connect mode */
    .flow-canvas.connecting { cursor: crosshair; }
    .connect-hint { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; border-radius: 99px; padding: 6px 16px; font-size: 12px; font-weight: 600; z-index: 300; display: none; }
    .connect-hint.show { display: block; }
  </style>
</head>
<body>
  <!-- ZIN Header -->
  <div style="background:#ffffff; position:fixed; top:0; left:0; right:0; z-index:300;">
    <img src="ZinBanner.png" alt="Zorginstituut Nederland" style="width:100%; max-width:960px; display:block; margin:0 auto;">
  </div>
  <style>
    .topnav { background: #39870c !important; position:fixed !important; left:0 !important; right:0 !important; width:100% !important; z-index:299; }
    .topnav a { color: rgba(255,255,255,0.85) !important; }
    .topnav a:hover, .topnav a.active { color: #fff !important; border-bottom-color: #fff !important; }
    .topnav-logo { color: #fff !important; }
  </style>

  <nav class="topnav" id="mainNav" style="background:#39870c !important; top:121px;">
    <div class="topnav-logo">Bemiddelingsregister</div>
    <a href="dashboard.html">Dashboard</a>
    <a href="app.html">Ketentest</a>
    <a href="flow.html" class="active">Flow</a>
    <div id="adminLink" style="display:none;"><a href="admin.html">Beheer</a></div>
    <div id="ketentestSwitcher" style="margin-left:16px;"></div>
    <div class="topnav-right">
      <span class="topnav-user" id="navUser"></span>
      <button class="btn btn-ghost btn-sm" style="color:rgba(255,255,255,0.7);" onclick="doLogout()">Uitloggen</button>
    </div>
  </nav>

  <!-- Toolbar -->
  <div class="flow-toolbar" id="toolbar">
    <button class="btn btn-sm btn-outline" onclick="autoLayout()">
      ⟳ Auto-layout
    </button>
    <button class="btn btn-sm btn-outline" onclick="clearAll()">
      🗑 Canvas leegmaken
    </button>
    <span style="font-size:12px; color:#6b7280; margin-left:8px;">
      Klik op <strong>Verbinden</strong> op een kaartje om een pijl te tekenen naar een ander kaartje
    </span>
  </div>

  <!-- Canvas -->
  <div class="flow-canvas" id="canvas">
    <div id="canvasInner" style="position:relative; width:3000px; height:2000px; background-image:radial-gradient(circle, #cbd5e1 1px, transparent 1px); background-size:24px 24px;">
    <svg id="arrowSvg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;">
      <defs>
        <marker id="arr" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#39870c"/>
        </marker>
        <marker id="arr-red" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
        </marker>
        <marker id="arr-temp" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
        </marker>
      </defs>
      <g id="edges"></g>
      <path id="tempEdge" d="" stroke="#6b7280" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr-temp)" style="display:none;"/>
    </svg>
    <div id="nodes" style="position:absolute;top:0;left:0;width:100%;height:100%;"></div>
  </div>

    </div><!-- /canvasInner -->
  <!-- Sidebar -->
  <div class="flow-sidebar" id="sidebar">
    <h4>Scenario's toevoegen</h4>
    <div id="sbList"></div>
  </div>

  <!-- Connect hint -->
  <div class="connect-hint" id="connectHint">🔗 Klik nu op het doelscenario</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js?v=21"></script>
  <script>
    let currentUser, currentProfile;
    let scenarios = [], activities = [], results = [], orgs = {};
    let nodePositions = {}; // scenarioId → {x,y,dbId}
    let edges = [];         // [{id,from_id,to_id}]
    let dragging = null, dragOff = {x:0,y:0};
    let connecting = null;  // scenarioId we're connecting FROM

    // ── Layout berekening ──────────────────────────────────────
    function bannerH() {
      return (document.querySelector('img[src="ZinBanner.png"]')?.getBoundingClientRect().height || 76);
    }
    function navH() { return 56; }
    function toolbarH() { return 44; }
    function topOffset() { return Math.round(bannerH()) + navH() + toolbarH(); }

    function applyLayout() {
      const banner = document.querySelector('img[src="ZinBanner.png"]');
      const bh = banner ? Math.ceil(banner.getBoundingClientRect().height) : 121;
      const nav = document.getElementById('mainNav');
      if (nav) nav.style.top = bh + 'px';
      const nh = 56;
      const tbh = 44;
      const toolbarTop = bh + nh;
      const canvasTop  = toolbarTop + tbh;
      document.getElementById('toolbar').style.top = toolbarTop + 'px';
      document.getElementById('canvas').style.top  = canvasTop + 'px';
      document.getElementById('sidebar').style.top = canvasTop + 'px';
    }

    // ── Init ──────────────────────────────────────────────────
    let activeKetentest = null;

    (async () => {
      currentUser = await requireAuth();
      if (!currentUser) return;
      currentProfile = await getUserProfile(currentUser.id);
      document.getElementById('navUser').textContent = currentProfile?.name || currentUser.email;
      if (currentProfile?.role === 'admin') document.getElementById('adminLink').style.display = '';

      const result = await ensureActiveKetentest();
      if (!result) return;
      activeKetentest = result.active;
      await renderKetentestSwitcher(onKetentestChanged);

      await loadData();
      applyLayout();
      renderSidebar();
      renderAll();
    })();

    async function onKetentestChanged(newId) {
      const result = await ensureActiveKetentest();
      activeKetentest = result.active;
      closePopup();
      cancelConnect();
      await loadData();
      document.getElementById('nodes').innerHTML = '';
      renderSidebar();
      renderAll();
    }

    window.addEventListener('resize', applyLayout);

    async function loadData() {
      if (!activeKetentest) return;

      const { data: scenarioData } = await sb.from('scenarios').select('*').eq('ketentest_id', activeKetentest.id).order('code');
      scenarios = scenarioData || [];
      const scenarioIds = scenarios.map(s => s.id);

      const [a, r, fn, fe, o] = await Promise.all([
        scenarioIds.length ? sb.from('activities').select('*').in('scenario_id', scenarioIds) : Promise.resolve({ data: [] }),
        sb.from('activity_results').select('*'),
        sb.from('flow_nodes').select('*').eq('ketentest_id', activeKetentest.id),
        sb.from('flow_edges').select('*').eq('ketentest_id', activeKetentest.id),
        sb.from('organisations').select('id,name,code'),
      ]);
      activities = a.data || [];
      const actIds = new Set(activities.map(x => x.id));
      results    = (r.data || []).filter(x => actIds.has(x.activity_id));
      edges      = fe.data || [];
      nodePositions = {};
      (fn.data || []).forEach(n => nodePositions[n.scenario_id] = {x:n.x, y:n.y, dbId:n.id, isStart:n.is_start||false});
      orgs = {};
      (o.data || []).forEach(o => orgs[o.id] = o.name || o.code);
    }

    // ── Helpers ───────────────────────────────────────────────
    function getStatus(sid) {
      const acts = activities.filter(a => a.scenario_id === sid);
      if (!acts.length) return 'open';
      const rs = acts.map(a => results.find(r => r.activity_id === a.id)?.result || 'open');
      if (rs.every(r => r === 'ok')) return 'ok';
      if (rs.some(r => r === 'nok')) return 'nok';
      return 'open';
    }
    function getPct(sid) {
      const acts = activities.filter(a => a.scenario_id === sid);
      if (!acts.length) return 0;
      const done = acts.filter(a => {const r=results.find(x=>x.activity_id===a.id); return r&&r.result!=='open';}).length;
      return Math.round(done/acts.length*100);
    }

    // ── Sidebar ───────────────────────────────────────────────
    function renderSidebar() {
      const onCanvas = new Set(Object.keys(nodePositions));
      document.getElementById('sbList').innerHTML = scenarios.map(s => `
        <div class="sb-item ${onCanvas.has(s.id)?'on':''}" onclick="${onCanvas.has(s.id)?'':` addNode('${s.id}')`}">
          <div class="sb-code">${{ok:'✅',nok:'❌',open:'⏳'}[getStatus(s.id)]} ${s.code}</div>
          <div class="sb-title">${s.title}</div>
        </div>`).join('');
    }

    // ── Nodes ─────────────────────────────────────────────────
    function renderAll() {
      renderNodes();
      renderEdges();
    }

    function renderNodes() {
      const container = document.getElementById('nodes');
      // Verwijder niet meer aanwezige nodes
      container.querySelectorAll('.flow-node').forEach(el => {
        if (!nodePositions[el.dataset.id]) el.remove();
      });
      Object.entries(nodePositions).forEach(([sid, pos]) => {
        const s = scenarios.find(x => x.id === sid);
        if (!s) return;
        let el = document.getElementById('fn-' + sid);
        if (!el) {
          el = document.createElement('div');
          el.id = 'fn-' + sid;
          el.className = 'flow-node';
          el.dataset.id = sid;
          container.appendChild(el);
          setupDrag(el, sid);
        }
        const status = getStatus(sid);
        const pct = getPct(sid);
        const acts = activities.filter(a => a.scenario_id === sid);
        const isStart = pos.isStart || false;
        el.className = `flow-node s-${status}${isStart ? ' start-node' : ''}`;
        el.dataset.id = sid;
        el.style.left = pos.x + 'px';
        el.style.top  = pos.y + 'px';
        el.innerHTML = `
          <div class="node-head">
            <div style="display:flex; align-items:center; gap:6px; flex:1; min-width:0;">
              ${isStart ? '<span class="start-badge">▶ START</span>' : ''}
              <span class="node-code">${s.code}</span>
            </div>
            <span class="node-emoji">${{ok:'✅',nok:'❌',open:'⏳'}[status]}</span>
          </div>
          <div class="node-title">${s.title}</div>
          <div class="node-bar"><div class="node-bar-fill" style="width:${pct}%"></div></div>
          <div class="node-foot">
            <span class="node-pct">${pct}% · ${acts.length} act.</span>
            <div class="node-actions">
              <button class="node-btn connect ${connecting===sid?'active':''}" onclick="event.stopPropagation(); startConnect('${sid}')">🔗 Verbinden</button>
              <button class="node-btn ${isStart?'active':'connect'}" onclick="event.stopPropagation(); toggleStart('${sid}')" title="${isStart?'Start verwijderen':'Markeer als start'}">${isStart?'⭐ Start':'☆ Start'}</button>
              <button class="node-btn remove" onclick="event.stopPropagation(); removeNode('${sid}')">✕</button>
            </div>
          </div>`;
        el.onclick = (e) => {
          if (connecting && connecting !== sid) { finishConnect(sid); return; }
          if (!connecting) showPopup(sid, el);
        };
      });
    }

    function setupDrag(el, sid) {
      el.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('node-btn')) return;
        if (connecting) return;
        e.preventDefault();
        dragging = sid;
        const rect = el.getBoundingClientRect();
        dragOff = {x: e.clientX - rect.left, y: e.clientY - rect.top};
        el.classList.add('dragging');
      });
    }

    document.getElementById('canvas').addEventListener('mousemove', (e) => {
      if (dragging) {
        const canvas = document.getElementById('canvas');
        const rect = canvas.getBoundingClientRect();
        const x = Math.max(0, e.clientX - rect.left + canvas.scrollLeft - dragOff.x);
        const y = Math.max(0, e.clientY - rect.top  + canvas.scrollTop  - dragOff.y);
        nodePositions[dragging].x = x;
        nodePositions[dragging].y = y;
        const el = document.getElementById('fn-' + dragging);
        if (el) { el.style.left = x+'px'; el.style.top = y+'px'; }
        renderEdges();
      }
      if (connecting) {
        const canvas = document.getElementById('canvas');
        const rect = canvas.getBoundingClientRect();
        const fromEl = document.getElementById('fn-' + connecting);
        if (!fromEl) return;
        const x1 = nodePositions[connecting].x + (fromEl.offsetWidth||190)/2;
        const y1 = nodePositions[connecting].y + (fromEl.offsetHeight||110)/2;
        const x2 = e.clientX - rect.left + canvas.scrollLeft;
        const y2 = e.clientY - rect.top  + canvas.scrollTop;
        const mx = (x1+x2)/2;
        const temp = document.getElementById('tempEdge');
        temp.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
        temp.style.display = '';
      }
    });

    document.getElementById('canvas').addEventListener('mouseup', async (e) => {
      if (dragging) {
        await savePos(dragging);
        document.getElementById('fn-'+dragging)?.classList.remove('dragging');
        dragging = null;
      }
    });

    // ── Connect ───────────────────────────────────────────────
    function startConnect(sid) {
      if (connecting === sid) { cancelConnect(); return; }
      connecting = sid;
      document.getElementById('canvas').style.cursor = 'crosshair';
      document.getElementById('connectHint').classList.add('show');
      renderNodes(); // update knop kleur
    }

    function cancelConnect() {
      connecting = null;
      document.getElementById('canvas').style.cursor = '';
      document.getElementById('connectHint').classList.remove('show');
      document.getElementById('tempEdge').style.display = 'none';
      renderNodes();
    }

    async function finishConnect(toId) {
      const fromId = connecting;
      cancelConnect();
      if (fromId === toId) return;
      if (edges.some(e => e.from_id === fromId && e.to_id === toId)) return;
      const {data, error} = await sb.from('flow_edges').insert({from_id: fromId, to_id: toId, ketentest_id: activeKetentest?.id}).select().single();
      if (error) { alert('Fout: ' + error.message); return; }
      edges.push(data);
      renderEdges();
    }

    // Escape annuleert connect
    document.addEventListener('keydown', e => { if (e.key === 'Escape') cancelConnect(); });

    // ── Edges ─────────────────────────────────────────────────
    function renderEdges() {
      const svg = document.getElementById('edges');
      const canvasRect = document.getElementById('canvas').getBoundingClientRect();
      svg.innerHTML = '';

      edges.forEach(edge => {
        const fromPos = nodePositions[edge.from_id];
        const toPos   = nodePositions[edge.to_id];
        if (!fromPos || !toPos) return;

        const fromEl = document.getElementById('fn-' + edge.from_id);
        const toEl   = document.getElementById('fn-' + edge.to_id);
        const fw = fromEl?.offsetWidth  || 190;
        const fh = fromEl?.offsetHeight || 110;
        const tw = toEl?.offsetWidth    || 190;
        const th = toEl?.offsetHeight   || 110;

        // Bepaal richting: horizontaal of verticaal?
        const dx = (toPos.x + tw/2) - (fromPos.x + fw/2);
        const dy = (toPos.y + th/2) - (fromPos.y + fh/2);
        let x1, y1, x2, y2, cx1, cy1, cx2, cy2;

        if (Math.abs(dx) > Math.abs(dy)) {
          // Meer horizontaal: rechts → links
          if (dx > 0) {
            x1 = fromPos.x + fw; y1 = fromPos.y + fh/2;
            x2 = toPos.x;        y2 = toPos.y  + th/2;
          } else {
            x1 = fromPos.x;      y1 = fromPos.y + fh/2;
            x2 = toPos.x + tw;   y2 = toPos.y  + th/2;
          }
          const mx = (x1+x2)/2;
          cx1 = mx; cy1 = y1; cx2 = mx; cy2 = y2;
        } else {
          // Meer verticaal: onder → boven
          if (dy > 0) {
            x1 = fromPos.x + fw/2; y1 = fromPos.y + fh;
            x2 = toPos.x  + tw/2;  y2 = toPos.y;
          } else {
            x1 = fromPos.x + fw/2; y1 = fromPos.y;
            x2 = toPos.x  + tw/2;  y2 = toPos.y + th;
          }
          const my = (y1+y2)/2;
          cx1 = x1; cy1 = my; cx2 = x2; cy2 = my;
        }

        // Pad voor pijl
        const path = document.createElementNS('http://www.w3.org/2000/svg','path');
        const d = `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`;
        path.setAttribute('d', d);
        path.setAttribute('stroke','#39870c');
        path.setAttribute('stroke-width','2.5');
        path.setAttribute('fill','none');
        path.setAttribute('marker-end','url(#arr)');
        path.setAttribute('stroke-linecap','round');

        // Onzichtbare klikzone
        const hit = document.createElementNS('http://www.w3.org/2000/svg','path');
        hit.setAttribute('d', d);
        hit.setAttribute('stroke','transparent');
        hit.setAttribute('stroke-width','14');
        hit.setAttribute('fill','none');
        hit.style.cursor = 'pointer';
        hit.addEventListener('mouseenter', () => { path.setAttribute('stroke','#dc2626'); path.setAttribute('marker-end','url(#arr-red)'); });
        hit.addEventListener('mouseleave', () => { path.setAttribute('stroke','#39870c'); path.setAttribute('marker-end','url(#arr)'); });
        hit.addEventListener('click', () => deleteEdge(edge.id));
        hit.setAttribute('title','Klik om verbinding te verwijderen');

        svg.appendChild(path);
        svg.appendChild(hit);
      });
    }

    async function deleteEdge(id) {
      if (!confirm('Verbinding verwijderen?')) return;
      await sb.from('flow_edges').delete().eq('id', id);
      edges = edges.filter(e => e.id !== id);
      renderEdges();
    }

    // ── CRUD ──────────────────────────────────────────────────
    async function toggleStart(sid) {
      const n = nodePositions[sid];
      if (!n) return;
      const newIsStart = !n.isStart;

      if (newIsStart) {
        // Verplaats naar links, maar zoek een vrije y-positie
        const startNodes = Object.entries(nodePositions).filter(([id, p]) => p.isStart && id !== sid);
        const usedY = startNodes.map(([,p]) => p.y);
        let y = 20;
        while (usedY.some(uy => Math.abs(uy - y) < 160)) y += 160;
        n.x = 20; n.y = y;
        await sb.from('flow_nodes').update({ is_start: true, x: 20, y }).eq('id', n.dbId);
      } else {
        await sb.from('flow_nodes').update({ is_start: false }).eq('id', n.dbId);
      }

      n.isStart = newIsStart;
      renderNodes();
      renderEdges();
    }

    async function addNode(sid) {
      const count = Object.keys(nodePositions).length;
      const x = 20 + (count % 4) * 220;
      const y = 20 + Math.floor(count / 4) * 150;
      const {data,error} = await sb.from('flow_nodes').insert({scenario_id:sid, x, y, ketentest_id: activeKetentest?.id}).select().single();
      if (error) { alert('Fout: '+error.message); return; }
      nodePositions[sid] = {x, y, dbId: data.id};
      renderNodes();
      renderSidebar();
    }

    async function removeNode(sid) {
      const n = nodePositions[sid];
      if (!n) return;
      const edgeIds = edges.filter(e=>e.from_id===sid||e.to_id===sid).map(e=>e.id);
      for (const id of edgeIds) await sb.from('flow_edges').delete().eq('id',id);
      edges = edges.filter(e=>e.from_id!==sid&&e.to_id!==sid);
      await sb.from('flow_nodes').delete().eq('id',n.dbId);
      delete nodePositions[sid];
      document.getElementById('fn-'+sid)?.remove();
      closePopup();
      renderEdges();
      renderSidebar();
    }

    async function savePos(sid) {
      const n = nodePositions[sid];
      if (!n?.dbId) return;
      await sb.from('flow_nodes').update({x:n.x, y:n.y, is_start:n.isStart||false}).eq('id',n.dbId);
    }

    async function clearAll() {
      if (!confirm('Alles verwijderen van het canvas voor deze ketentest?')) return;
      await sb.from('flow_edges').delete().eq('ketentest_id', activeKetentest?.id);
      await sb.from('flow_nodes').delete().eq('ketentest_id', activeKetentest?.id);
      nodePositions = {}; edges = [];
      document.getElementById('nodes').innerHTML = '';
      renderEdges(); renderSidebar();
    }

    function autoLayout() {
      const ids = Object.keys(nodePositions);
      const inDeg = {}; ids.forEach(id => inDeg[id] = 0);
      edges.forEach(e => { if(inDeg[e.to_id]!==undefined) inDeg[e.to_id]++; });
      const levels = {}; const queue = ids.filter(id=>inDeg[id]===0);
      queue.forEach(id=>levels[id]=0);
      const visited = new Set(queue);
      while(queue.length) {
        const curr = queue.shift();
        edges.filter(e=>e.from_id===curr&&nodePositions[e.to_id]).forEach(e=>{
          levels[e.to_id] = Math.max(levels[e.to_id]||0,(levels[curr]||0)+1);
          if(!visited.has(e.to_id)){visited.add(e.to_id);queue.push(e.to_id);}
        });
      }
      ids.forEach(id=>{ if(levels[id]===undefined) levels[id]=0; });
      const perLvl = {};
      Object.entries(levels).forEach(([id,lvl])=>{ if(!perLvl[lvl]) perLvl[lvl]=[]; perLvl[lvl].push(id); });
      const saves = [];
      Object.entries(perLvl).forEach(([lvl,ids])=>{
        ids.forEach((id,i)=>{ nodePositions[id].x=parseInt(lvl)*230+20; nodePositions[id].y=i*155+20; saves.push(savePos(id)); });
      });
      Promise.all(saves);
      renderAll();
    }

    // ── Popup ─────────────────────────────────────────────────
    function showPopup(sid, nodeEl) {
      closePopup();
      const s = scenarios.find(x=>x.id===sid); if(!s) return;
      const acts = activities.filter(a=>a.scenario_id===sid);
      const status = getStatus(sid);
      const statusColor = {ok:'#16a34a',nok:'#dc2626',open:'#6b7280'}[status];
      const statusBg    = {ok:'#dcfce7',nok:'#fee2e2',open:'#f3f4f6'}[status];
      const statusLabel = {ok:'✅ Geslaagd',nok:'❌ Mislukt',open:'⏳ Open'}[status];

      const popup = document.createElement('div');
      popup.id = 'nodePopup';
      popup.className = 'node-popup';
      const nx = nodePositions[sid].x + (nodeEl.offsetWidth||190) + 10;
      const ny = nodePositions[sid].y;
      popup.style.left = nx+'px'; popup.style.top = ny+'px';

      popup.innerHTML = `
        <div class="popup-head" style="background:${statusBg}; border-bottom:1px solid rgba(0,0,0,0.08);">
          <div>
            <div style="font-size:10px;font-weight:800;color:${statusColor};">${s.code}</div>
            <div style="font-size:13px;font-weight:700;color:#111;line-height:1.4;">${s.title}</div>
            <div style="margin-top:4px;"><span style="background:${statusBg};color:${statusColor};border:1px solid ${statusColor}33;border-radius:99px;padding:1px 8px;font-size:10px;font-weight:700;">${statusLabel}</span></div>
          </div>
          <button class="popup-close" onclick="closePopup()">✕</button>
        </div>
        ${acts.length ? `
        <div style="padding:6px 12px 4px;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid #f3f4f6;">
          Activiteiten (${acts.length})
        </div>
        <div class="popup-acts">
          ${acts.map(a => {
            const r = results.find(x=>x.activity_id===a.id);
            const res = r?.result||'open';
            const dot = {ok:'✅',nok:'❌',open:'⏳'}[res];
            const acc = a.acceptant_org_id ? orgs[a.acceptant_org_id] : null;
            return `<div class="popup-act">
              <span style="font-size:13px;flex-shrink:0;">${dot}</span>
              <div style="flex:1;min-width:0;">
                <div style="font-size:12px;color:#111;line-height:1.4;">${a.description}</div>
                ${acc?`<div style="font-size:10px;color:#6b7280;margin-top:1px;">Acceptant: <strong>${acc}</strong></div>`:''}
                ${r?.notes?`<div style="font-size:10px;color:#92400e;margin-top:1px;font-style:italic;">"${r.notes.substring(0,60)}${r.notes.length>60?'...':''}"</div>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>` : '<div style="padding:12px;font-size:12px;color:#6b7280;font-style:italic;">Geen activiteiten</div>'}`;

      document.getElementById('nodes').appendChild(popup);

      setTimeout(()=>{
        document.addEventListener('click', function close(e){
          if(!popup.contains(e.target)&&!nodeEl.contains(e.target)){
            popup.remove();
            document.removeEventListener('click',close);
          }
        });
      },50);
    }

    function closePopup() { document.getElementById('nodePopup')?.remove(); }

    async function doLogout() {
      await sb.auth.signOut();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
